<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor de Cena</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-troika-text/dist/aframe-troika-text.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }

    #ui {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 220px;
    }

    #scene-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }

    #back-btn {
      background: rgba(15, 15, 15, 0.8);
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 13px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      line-height: 1;
    }

    #back-btn:hover { color: white; }

    #scene-name {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .btn-group {
      display: flex;
      gap: 6px;
    }

    .btn {
      background: rgba(15, 15, 15, 0.8);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      backdrop-filter: blur(6px);
      transition: background 0.15s;
      flex: 1;
    }

    .btn:hover { background: rgba(50, 50, 50, 0.95); }

    #controls {
      display: none;
      background: rgba(15, 15, 15, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 10px;
      backdrop-filter: blur(8px);
      padding: 12px 14px;
      color: white;
    }

    .panel-title {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 12px;
    }

    .control-row { margin-top: 10px; }
    .control-row:first-of-type { margin-top: 0; }

    .control-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.75);
      margin-bottom: 4px;
    }

    .control-label span {
      color: rgba(255, 255, 255, 0.45);
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #5b9cf6;
      cursor: pointer;
    }

    .btn-remove {
      width: 100%;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.35);
      color: rgba(239,68,68,0.9);
      border-radius: 6px;
      padding: 7px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-remove:hover { background: rgba(239,68,68,0.28); }


    #controls textarea {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 6px;
      color: rgba(255,255,255,0.85);
      font-size: 12px;
      padding: 7px 9px;
      resize: vertical;
      outline: none;
      font-family: sans-serif;
      margin-top: 4px;
      box-sizing: border-box;
    }

    #controls textarea:focus { border-color: rgba(91,156,246,0.5); }

    #scene-settings {
      background: rgba(15,15,15,0.8);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 8px;
      backdrop-filter: blur(6px);
      padding: 10px 12px;
    }

    .settings-label {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }

    #next-scene-select {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 6px;
      color: rgba(255,255,255,0.85);
      font-size: 12px;
      padding: 6px 8px;
      cursor: pointer;
      outline: none;
    }

    .settings-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin: 10px 0;
    }

    #music-name {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    #music-row {
      display: flex;
      gap: 6px;
    }

    .btn-music {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: rgba(255,255,255,0.8);
      font-size: 12px;
      padding: 6px 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-music:hover { background: rgba(255,255,255,0.12); }

    .btn-music-remove {
      background: rgba(239,68,68,0.12);
      border-color: rgba(239,68,68,0.3);
      color: rgba(239,68,68,0.8);
      flex: none;
      padding: 6px 10px;
    }

    .btn-music-remove:hover { background: rgba(239,68,68,0.22); }

    #button-controls,
    #text-panel-controls,
    #label-controls {
      display: none;
      background: rgba(15,15,15,0.82);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 10px;
      backdrop-filter: blur(8px);
      padding: 12px 14px;
      color: white;
    }

    #btn-label-input, #btn-target-select, #label-text-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 6px;
      color: rgba(255,255,255,0.85);
      font-size: 12px;
      padding: 7px 9px;
      outline: none;
      box-sizing: border-box;
      margin-top: 4px;
    }

    #btn-label-input:focus,
    #btn-target-select:focus,
    #label-text-input:focus { border-color: rgba(91,156,246,0.5); }

    #btn-target-select { padding: 6px 8px; cursor: pointer; }

    .hidden { display: none !important; }

    #bg-picker-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 10001;
      align-items: center;
      justify-content: center;
    }
    #bg-picker-overlay.open { display: flex; }

    #bg-picker {
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 20px;
      width: 480px;
      max-width: 95vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #bg-picker-title {
      font-size: 14px;
      font-weight: 600;
      color: white;
    }

    #bg-picker-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      overflow-y: auto;
      max-height: 50vh;
    }

    .bg-thumb {
      aspect-ratio: 2/1;
      object-fit: cover;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s;
      width: 100%;
    }

    .bg-thumb:hover { border-color: rgba(255,255,255,0.5); }
    .bg-thumb.active { border-color: #5b9cf6; }

    .bg-item {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .bg-item-name {
      font-size: 11px;
      color: rgba(255,255,255,0.65);
      text-align: center;
      padding: 2px 4px;
      border-radius: 4px;
      border: 1px solid transparent;
      outline: none;
      background: transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: text;
    }

    .bg-item-name:focus {
      border-color: rgba(91,156,246,0.6);
      background: rgba(255,255,255,0.06);
    }

    .bg-delete-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(239,68,68,0.85);
      border: none;
      border-radius: 4px;
      color: white;
      width: 18px;
      height: 18px;
      font-size: 10px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .bg-item:hover .bg-delete-btn { opacity: 1; }

    #bg-picker-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="scene-header">
      <button id="back-btn" onclick="window.location.href='/'">←</button>
      <span id="scene-name">Carregando...</span>
    </div>

    <input id="file-input" type="file" accept="image/*" style="display:none">
    <input id="bg-input"   type="file" accept="image/*" style="display:none">
    <div id="edit-tools" class="btn-group">
      <button class="btn" id="upload-btn">+ Imagem</button>
      <button class="btn" id="bg-btn">&#x1F5BC; Fundo</button>
    </div>

    <div id="nav-tools" class="btn-group">
      <button class="btn" id="add-nav-btn">+ Navegação</button>
      <button class="btn" id="add-text-panel-btn">+ Texto</button>
      <button class="btn" id="add-label-btn">+ Legenda</button>
    </div>

    <input id="music-input"      type="file" accept="audio/*" style="display:none">
    <input id="clicksound-input" type="file" accept="audio/*" style="display:none">
    <div id="scene-settings">
      <div class="settings-label">Próxima cena</div>
      <select id="next-scene-select">
        <option value="">— nenhuma —</option>
      </select>

      <hr class="settings-divider">

      <div class="settings-label">Música de fundo</div>
      <div id="music-name">Nenhuma</div>
      <div id="music-row">
        <button class="btn-music" id="music-btn">+ Áudio</button>
        <button class="btn-music btn-music-remove hidden" id="music-remove-btn">✕</button>
      </div>

      <hr class="settings-divider">

      <div class="settings-label">Som ao clicar objeto</div>
      <div id="clicksound-name">Nenhum</div>
      <div id="clicksound-row">
        <button class="btn-music" id="clicksound-btn">+ Áudio</button>
        <button class="btn-music btn-music-remove hidden" id="clicksound-remove-btn">✕</button>
      </div>
    </div>

    <div id="controls">
      <div class="panel-title" id="controls-title">Imagem 1</div>

      <div class="control-row">
        <div class="control-label">
          Tamanho <span id="scale-val">1.0×</span>
        </div>
        <input type="range" id="scale-slider" min="0.2" max="6" step="0.05" value="1">
      </div>

      <div class="control-row">
        <div class="control-label">
          Rotação <span id="rotation-val">0°</span>
        </div>
        <input type="range" id="rotation-slider" min="-180" max="180" step="1" value="0">
      </div>

      <div class="control-row">
        <div class="control-label">Descrição</div>
        <textarea id="desc-input" placeholder="Adicione uma descrição..." rows="3"></textarea>
      </div>

      <div class="control-row">
        <label class="control-label" style="cursor:pointer; user-select:none">
          Sumir após visualizar
          <input type="checkbox" id="disappear-input" style="cursor:pointer">
        </label>
      </div>

      <div class="control-row">
        <label class="control-label" style="cursor:pointer; user-select:none">
          Necessário para avançar
          <input type="checkbox" id="required-input" style="cursor:pointer">
        </label>
      </div>

      <div class="control-row">
        <button class="btn-remove" id="remove-btn">Remover objeto</button>
      </div>
    </div>

    <div id="button-controls">
      <div class="panel-title">Botão de navegação</div>

      <div class="control-row">
        <div class="control-label">Label</div>
        <input type="text" id="btn-label-input" placeholder="Texto do botão...">
      </div>

      <div class="control-row">
        <div class="control-label">Navegar para</div>
        <select id="btn-target-select">
          <option value="">— selecione a cena —</option>
        </select>
      </div>

      <div class="control-row">
        <div class="control-label">
          Tamanho <span id="btn-scale-val">1.0×</span>
        </div>
        <input type="range" id="btn-scale-slider" min="0.2" max="3" step="0.05" value="1">
      </div>

      <div class="control-row">
        <button class="btn-remove" id="btn-remove-btn">Remover botão</button>
      </div>
    </div>

    <div id="text-panel-controls">
      <div class="panel-title">Painel de texto</div>

      <div class="control-row">
        <div class="control-label">Conteúdo</div>
        <textarea id="panel-content-input"
                  placeholder="Escreva o texto do painel..."
                  rows="5"></textarea>
      </div>

      <div class="control-row">
        <div class="control-label">
          Tamanho <span id="panel-scale-val">1.0×</span>
        </div>
        <input type="range" id="panel-scale-slider" min="0.2" max="3" step="0.05" value="1">
      </div>

      <div class="control-row">
        <button class="btn-remove" id="panel-remove-btn">Remover painel</button>
      </div>
    </div>
    <div id="label-controls">
      <div class="panel-title">Legenda</div>

      <div class="control-row">
        <div class="control-label">Texto</div>
        <input type="text" id="label-text-input" placeholder="Texto da legenda...">
      </div>

      <div class="control-row">
        <div class="control-label">
          Tamanho <span id="label-scale-val">1.0×</span>
        </div>
        <input type="range" id="label-scale-slider" min="0.2" max="3" step="0.05" value="1">
      </div>

      <div class="control-row">
        <button class="btn-remove" id="label-remove-btn">Remover legenda</button>
      </div>
    </div>
  </div>

  <!-- Seletor de fundos -->
  <div id="bg-picker-overlay">
    <div id="bg-picker">
      <div id="bg-picker-title">Selecionar fundo</div>
      <div id="bg-picker-grid"></div>
      <div id="bg-picker-actions">
        <button class="btn" id="bg-picker-cancel">Cancelar</button>
        <button class="btn" id="bg-picker-upload">+ Novo fundo</button>
      </div>
    </div>
  </div>

  <a-scene>
    <a-assets id="assets"></a-assets>
    <a-sky id="sky" rotation="0 -130 0"></a-sky>

    <!-- Dialog no espaço da cena — posicionado via JS ao abrir -->
    <a-entity id="hud-dialog" visible="false">
      <a-plane width="1.4" height="0.8" color="#1a1a1a" opacity="0.92"
               material="side: double"></a-plane>
      <a-entity id="hud-dialog-text"
                troika-text="value: ; color: #dddddd; fontSize: 0.07; maxWidth: 1.2; textAlign: center; anchorX: center; anchorY: middle"
                position="0 0.15 0.01"></a-entity>
      <a-plane id="hud-close-btn" class="dialog-btn"
               width="0.4" height="0.12" color="#333333" opacity="0.9"
               position="0 -0.25 0.01" material="side: double">
        <a-entity troika-text="value: Fechar; color: #ffffff; fontSize: 0.055; anchorX: center; anchorY: middle"
                  position="0 0 0.01"></a-entity>
      </a-plane>
    </a-entity>

    <a-camera id="cam" look-controls="pointerLockEnabled: false">
      <a-cursor id="cursor" cursor="rayOrigin: mouse"
                raycaster="objects: .draggable, .dialog-btn; far: 20"
                color="#ffffff" opacity="0"></a-cursor>
    </a-camera>
  </a-scene>

  <script>
    // ── Estado ─────────────────────────────────────────────────────────────────
    let sceneId            = null;
    let selectedEl         = null;
    let imageCount         = 0;
    let viewMode           = false;
    let pendingDisappearEl = null;
    let nextSceneId        = null;
    let clickedRequiredIds = new Set();
    let lastClickedEl      = null;
    let bgAudio            = null;
    let currentBgPath      = null;
    let audioCtx           = null;
    let clickSoundBuffer   = null;
    let selectedBtnEl      = null;
    let btnCount           = 0;
    let selectedPanelEl    = null;
    let panelCount         = 0;
    let selectedLabelEl    = null;
    let labelCount         = 0;

    // ── Modo visualização ──────────────────────────────────────────────────────
    function setViewMode(on) {
      viewMode = on;
      document.getElementById('edit-tools').classList.toggle('hidden', on);
      document.getElementById('nav-tools').classList.toggle('hidden', on);
      document.getElementById('scene-settings').classList.toggle('hidden', on);
      document.getElementById('controls').classList.toggle('hidden', on);
      document.getElementById('button-controls').classList.toggle('hidden', on);
      document.getElementById('text-panel-controls').classList.toggle('hidden', on);
      document.getElementById('label-controls').classList.toggle('hidden', on);
      if (on) { selectedEl = null; selectedBtnEl = null; selectedPanelEl = null; selectedLabelEl = null; }

      // Modo edição: raycaster segue o mouse (clique direto nos objetos)
      // Modo visualização: raycaster no centro da tela (mira com a câmera)
      const cursorEl = document.querySelector('#cursor');
      cursorEl.setAttribute('cursor', on ? 'rayOrigin: entity' : 'rayOrigin: mouse');
      cursorEl.setAttribute('opacity', on ? '0.8' : '0');
    }

    // ── Dialog "você clicou" ───────────────────────────────────────────────────
    function positionDialog() {
      const cam3D = document.querySelector('#cam').getObject3D('camera');
      const camPos = new THREE.Vector3();
      cam3D.getWorldPosition(camPos);
      const forward = new THREE.Vector3(0, 0, -1);
      forward.applyQuaternion(cam3D.getWorldQuaternion(new THREE.Quaternion()));
      forward.normalize();
      const dialogEl = document.querySelector('#hud-dialog');
      dialogEl.object3D.position.copy(camPos.clone().add(forward.multiplyScalar(1.5)));
      dialogEl.object3D.lookAt(camPos);
    }

    function openClickDialog(el) {
      playClickSound();
      const desc = (el.dataset.objDescription || '').trim();
      document.querySelector('#hud-dialog-text').setAttribute('troika-text', 'value', desc || 'Sem descrição.');
      pendingDisappearEl = el.dataset.objDisappear === 'true' ? el : null;
      lastClickedEl = el;
      positionDialog();
      document.querySelector('#hud-dialog').setAttribute('visible', true);
    }

    function closeClickDialog() {
      document.querySelector('#hud-dialog').setAttribute('visible', false);
      if (pendingDisappearEl) {
        pendingDisappearEl.object3D.visible = false;
        pendingDisappearEl = null;
      }
      if (lastClickedEl && lastClickedEl.dataset.objRequired === 'true') {
        clickedRequiredIds.add(lastClickedEl.dataset.objId);
        lastClickedEl = null;
        checkCompletion();
      }
    }

    function checkCompletion() {
      if (!nextSceneId) return;
      const requiredEls = Array.from(
        document.querySelectorAll('a-image[drag-move]')
      ).filter(el => el.dataset.objRequired === 'true');
      if (requiredEls.length === 0) return;
      if (requiredEls.every(el => clickedRequiredIds.has(el.dataset.objId))) {
        loadScene(nextSceneId);
      }
    }

    // ── Música ─────────────────────────────────────────────────────────────────
    function startMusic(path) {
      if (!path) return;
      bgAudio = new Audio(path);
      bgAudio.loop = true;
      bgAudio.volume = 0.5;
      bgAudio.play().catch(() => {});
    }

    function stopMusic() {
      if (!bgAudio) return;
      bgAudio.pause();
      bgAudio = null;
    }

    async function loadScene(id) {
      stopMusic();
      clickSoundBuffer = null;

      sceneId            = id;
      selectedEl         = null;
      selectedBtnEl      = null;
      selectedPanelEl    = null;
      selectedLabelEl    = null;
      imageCount         = 0;
      btnCount           = 0;
      panelCount         = 0;
      labelCount         = 0;
      pendingDisappearEl = null;
      lastClickedEl      = null;
      nextSceneId        = null;
      clickedRequiredIds = new Set();

      document.querySelectorAll('a-image[drag-move]').forEach(el => el.remove());
      document.querySelectorAll('a-plane[button-move]').forEach(el => el.remove());
      document.querySelectorAll('a-plane[text-panel-move]').forEach(el => el.remove());
      document.querySelectorAll('a-plane[label-move]').forEach(el => el.remove());
      document.querySelectorAll('#assets img').forEach(el => el.remove());
      document.querySelector('#hud-dialog').setAttribute('visible', false);
      document.getElementById('controls').style.display = 'none';
      document.getElementById('button-controls').style.display = 'none';
      document.getElementById('label-controls').style.display = 'none';

      const res = await fetch(`/api/scenes/${id}`);
      if (!res.ok) return window.location.href = '/';
      const scene = await res.json();

      sceneId     = scene.id;
      nextSceneId = scene.nextSceneId || null;
      document.title = scene.name;
      document.getElementById('scene-name').textContent = scene.name;

      setViewMode(true);
      startMusic(scene.music || null);
      loadClickSound(scene.clickSound || null);

      currentBgPath = scene.background;
      applyBackground(scene.background);
      if (scene.objects?.length) loadObjects(scene.objects);
      if (scene.buttons?.length) loadButtons(scene.buttons);

      // Aguarda um ciclo de renderização antes de adicionar painéis de texto,
      // pois o THREE.js precisa processar as remoções anteriores primeiro.
      if (scene.textPanels?.length) {
        requestAnimationFrame(() => loadTextPanels(scene.textPanels));
      }
      if (scene.labels?.length) {
        requestAnimationFrame(() => loadLabels(scene.labels));
      }

      history.pushState({}, '', `/editor.html?id=${id}&mode=view`);
    }

    function updateMusicUI(musicPath) {
      const name = musicPath
        ? decodeURIComponent(musicPath.split('/').pop().replace(/^[a-f0-9]+\./, ''))
        : 'Nenhuma';
      document.getElementById('music-name').textContent = name;
      document.getElementById('music-remove-btn').classList.toggle('hidden', !musicPath);
    }

    async function loadClickSound(soundPath) {
      if (!soundPath) return;
      try {
        audioCtx = audioCtx || new AudioContext();
        const res = await fetch(soundPath);
        const buf = await res.arrayBuffer();
        clickSoundBuffer = await audioCtx.decodeAudioData(buf);
      } catch (e) {}
    }

    function playClickSound() {
      if (!audioCtx || !clickSoundBuffer) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const src = audioCtx.createBufferSource();
      src.buffer = clickSoundBuffer;
      src.connect(audioCtx.destination);
      src.start();
    }

    function updateClickSoundUI(soundPath) {
      const name = soundPath
        ? decodeURIComponent(soundPath.split('/').pop().replace(/^[a-f0-9]+\./, ''))
        : 'Nenhum';

    // ── Init: carrega cena da API ──────────────────────────────────────────────
    (async function init() {
      const params = new URLSearchParams(window.location.search);
      sceneId = params.get('id');
      if (!sceneId) return window.location.href = '/';

      const res = await fetch(`/api/scenes/${sceneId}`);
      if (!res.ok) return window.location.href = '/';

      const scene = await res.json();
      document.title = scene.name;
      document.getElementById('scene-name').textContent = scene.name;
      nextSceneId = scene.nextSceneId || null;

      if (params.get('mode') === 'view') {
        setViewMode(true);
        startMusic(scene.music || null);
        loadClickSound(scene.clickSound || null);
      } else {
        updateMusicUI(scene.music || null);
        updateClickSoundUI(scene.clickSound || null);
        const allScenes = await fetch('/api/scenes').then(r => r.json());
        const sel = document.getElementById('next-scene-select');
        allScenes
          .filter(s => s.id !== sceneId)
          .forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.id;
            opt.textContent = s.name;
            if (s.id === nextSceneId) opt.selected = true;
            sel.appendChild(opt);
          });
        sel.addEventListener('change', async function () {
          nextSceneId = this.value || null;
          await fetch(`/api/scenes/${sceneId}`, {
            method:  'PUT',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ nextSceneId })
          });
        });

        // Popula seletor de destino dos botões de navegação
        const btnSel = document.getElementById('btn-target-select');
        allScenes.filter(s => s.id !== sceneId).forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = s.name;
          btnSel.appendChild(opt);
        });
      }

      currentBgPath = scene.background;

      const aScene = document.querySelector('a-scene');
      const onReady = () => {
        applyBackground(scene.background);
        if (scene.objects?.length)     loadObjects(scene.objects);
        if (scene.buttons?.length)     loadButtons(scene.buttons);
        if (scene.textPanels?.length)  loadTextPanels(scene.textPanels);
        if (scene.labels?.length)      loadLabels(scene.labels);
      };
      aScene.hasLoaded ? onReady() : aScene.addEventListener('loaded', onReady);
    })();

    // ── Fundo ──────────────────────────────────────────────────────────────────
    function applyBackground(bgPath) {
      const img = new Image();
      img.onload = () => {
        const tex = new THREE.Texture(img);
        tex.needsUpdate = true;
        const mesh = document.querySelector('#sky').getObject3D('mesh');
        if (!mesh) return;
        if (mesh.material.map) mesh.material.map.dispose();
        mesh.material.map = tex;
        mesh.material.needsUpdate = true;
      };
      img.src = bgPath;
    }

    // ── Carregar objetos salvos ────────────────────────────────────────────────
    function loadObjects(objects) {
      objects.forEach(obj => {
        const el = document.createElement('a-image');
        el.setAttribute('src',      obj.src);
        el.setAttribute('width',    obj.width);
        el.setAttribute('height',   obj.height);
        el.setAttribute('position', `${obj.position.x} ${obj.position.y} ${obj.position.z}`);
        el.setAttribute('scale',    `${obj.scale} ${obj.scale} ${obj.scale}`);
        el.setAttribute('material', 'transparent: true; alphaTest: 0.05');
        el.setAttribute('drag-move', '');
        el.dataset.objId          = obj.id;
        el.dataset.objSrc         = obj.src;
        el.dataset.objDescription = obj.description    || '';
        el.dataset.objDisappear   = obj.disappearOnClick ? 'true' : 'false';
        el.dataset.objRequired    = obj.isRequired       ? 'true' : 'false';
        el.userData = { imgNum: ++imageCount, rotZ: obj.rotZ || 0 };
        document.querySelector('a-scene').appendChild(el);

        el.addEventListener('loaded', () => {
          const cam3D = document.querySelector('#cam').getObject3D('camera');
          const camPos = new THREE.Vector3();
          cam3D.getWorldPosition(camPos);
          el.object3D.lookAt(camPos);
          const r = el.object3D.rotation;
          el.object3D.rotation.set(r.x, r.y, r.z + (obj.rotZ || 0));
        });
      });
    }

          scale:       el.object3D.scale.x,
          rotZ:        el.userData.rotZ || 0,
          width:       parseFloat(el.getAttribute('width')),
          height:      parseFloat(el.getAttribute('height')),
          description:      el.dataset.objDescription || '',

    // ── Button-move component ──────────────────────────────────────────────────
    AFRAME.registerComponent('button-move', {
      schema: { distance: { type: 'number', default: 4 } },

      init() {
        this.el.classList.add('draggable');
        this.active = false;
        this._down = this._down.bind(this);
        this._move = this._move.bind(this);
        this._up   = this._up.bind(this);
        this.el.addEventListener('mousedown', this._down);
        this.el.addEventListener('touchstart', this._down);
        this.el.addEventListener('click', () => {
          if (viewMode) {
            const target = this.el.dataset.btnTargetSceneId;
            if (target) loadScene(target);
          } else {
            selectButton(this.el);
          }
        });
      },

      _faceCamera() {
        const cam3D = document.querySelector('#cam').getObject3D('camera');
        const camPos = new THREE.Vector3();
        cam3D.getWorldPosition(camPos);
        this.el.object3D.lookAt(camPos);
        const rz = this.el.userData.rotZ || 0;
        const r  = this.el.object3D.rotation;
        this.el.object3D.rotation.set(r.x, r.y, r.z + rz);
      },

      _down() {
        if (viewMode) return;
        this.active = true;
        selectButton(this.el);
        document.querySelector('#cam').components['look-controls'].pause();
        window.addEventListener('mousemove', this._move);
        window.addEventListener('touchmove', this._move, { passive: false });
        window.addEventListener('mouseup',  this._up);
        window.addEventListener('touchend', this._up);
      },

      _move(e) {
        if (!this.active) return;
        e.preventDefault && e.preventDefault();
        const canvas = this.el.sceneEl.canvas;
        const { left, top, width, height } = canvas.getBoundingClientRect();
        const cam3D = document.querySelector('#cam').getObject3D('camera');
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        const nx = ((cx - left) / width)  *  2 - 1;
        const ny = -((cy - top) / height) *  2 + 1;
        const rc = new THREE.Raycaster();
        rc.setFromCamera({ x: nx, y: ny }, cam3D);
        const pos = rc.ray.origin.clone()
          .add(rc.ray.direction.clone().normalize().multiplyScalar(this.data.distance));
        this.el.object3D.position.copy(pos);
        this._faceCamera();
      },

      _up() {
        this.active = false;
        document.querySelector('#cam').components['look-controls'].play();
        window.removeEventListener('mousemove', this._move);
        window.removeEventListener('touchmove', this._move);
        window.removeEventListener('mouseup',   this._up);
        window.removeEventListener('touchend',  this._up);
        saveButtons();
      },

      remove() {
        this.el.removeEventListener('mousedown', this._down);
        this.el.removeEventListener('touchstart', this._down);
        if (this.active) {
          this.active = false;
          document.querySelector('#cam').components['look-controls'].play();
          window.removeEventListener('mousemove', this._move);
          window.removeEventListener('touchmove', this._move);
          window.removeEventListener('mouseup',   this._up);
          window.removeEventListener('touchend',  this._up);
        }
      }
    });

        this._down = this._down.bind(this);
        this._move = this._move.bind(this);
        this._up   = this._up.bind(this);
        this.el.addEventListener('mousedown', this._down);
        this.el.addEventListener('touchstart', this._down);
        this.el.addEventListener('click', () => {
          if (viewMode) openClickDialog(this.el);
          else selectImage(this.el);
        });
      },

      _faceCamera() {
        const cam3D = document.querySelector('#cam').getObject3D('camera');
        const camPos = new THREE.Vector3();
        cam3D.getWorldPosition(camPos);
        this.el.object3D.lookAt(camPos);
        const rz = this.el.userData.rotZ || 0;
        const r  = this.el.object3D.rotation;
        this.el.object3D.rotation.set(r.x, r.y, r.z + rz);
      },

      _down() {
        if (viewMode) return;
        this.active = true;
        selectImage(this.el);
        document.querySelector('#cam').components['look-controls'].pause();
        window.addEventListener('mousemove', this._move);
        window.addEventListener('touchmove', this._move, { passive: false });
        window.addEventListener('mouseup',  this._up);
        window.addEventListener('touchend', this._up);
      },

      _move(e) {
        if (!this.active) return;
        e.preventDefault && e.preventDefault();

        const canvas = this.el.sceneEl.canvas;
        const { left, top, width, height } = canvas.getBoundingClientRect();
        const cam3D = document.querySelector('#cam').getObject3D('camera');

        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;

        const nx = ((cx - left) / width)  *  2 - 1;
        const ny = -((cy - top) / height) *  2 + 1;

        const rc = new THREE.Raycaster();
        rc.setFromCamera({ x: nx, y: ny }, cam3D);

        const pos = rc.ray.origin.clone()
          .add(rc.ray.direction.clone().normalize().multiplyScalar(this.data.distance));

        this.el.object3D.position.copy(pos);
        this._faceCamera();
      },

      _up() {
        this.active = false;
        document.querySelector('#cam').components['look-controls'].play();
        window.removeEventListener('mousemove', this._move);
        window.removeEventListener('touchmove', this._move);
        window.removeEventListener('mouseup',   this._up);
        window.removeEventListener('touchend',  this._up);
        saveObjects();
      },

      remove() {
        this.el.removeEventListener('mousedown', this._down);
        this.el.removeEventListener('touchstart', this._down);
        if (this.active) {
          this.active = false;
          document.querySelector('#cam').components['look-controls'].play();
          window.removeEventListener('mousemove', this._move);
          window.removeEventListener('touchmove', this._move);
          window.removeEventListener('mouseup',   this._up);
          window.removeEventListener('touchend',  this._up);
        }
      }
    });

    // ── Select ─────────────────────────────────────────────────────────────────
    function selectImage(el) {
      selectedEl = el;
      document.getElementById('controls-title').textContent =
        'Imagem ' + (el.userData.imgNum || '');
      document.getElementById('controls').style.display = 'block';

      const s    = el.object3D.scale.x;
      const rDeg = Math.round((el.userData.rotZ || 0) * 180 / Math.PI);

      document.getElementById('scale-slider').value    = s;
      document.getElementById('rotation-slider').value = rDeg;
      document.getElementById('scale-val').textContent    = s.toFixed(1) + '×';
      document.getElementById('rotation-val').textContent = rDeg + '°';
      document.getElementById('desc-input').value = el.dataset.objDescription || '';
      document.getElementById('disappear-input').checked = el.dataset.objDisappear === 'true';
      document.getElementById('required-input').checked  = el.dataset.objRequired  === 'true';
    }

    // ── Descrição ──────────────────────────────────────────────────────────────
    document.getElementById('desc-input').addEventListener('blur', function () {
      if (!selectedEl) return;
      selectedEl.dataset.objDescription = this.value;
      saveObjects();
    });

    document.getElementById('disappear-input').addEventListener('change', function () {
      if (!selectedEl) return;
      selectedEl.dataset.objDisappear = this.checked ? 'true' : 'false';
      saveObjects();
    });

    document.getElementById('required-input').addEventListener('change', function () {
      if (!selectedEl) return;
      selectedEl.dataset.objRequired = this.checked ? 'true' : 'false';
      saveObjects();
    });

    // ── Sliders ────────────────────────────────────────────────────────────────
    document.getElementById('scale-slider').addEventListener('input', function () {
      if (!selectedEl) return;
      const s = parseFloat(this.value);
      selectedEl.object3D.scale.set(s, s, s);
      document.getElementById('scale-val').textContent = s.toFixed(1) + '×';
    });

    document.getElementById('scale-slider').addEventListener('change', () => saveObjects());

    document.getElementById('rotation-slider').addEventListener('input', function () {
      if (!selectedEl) return;
      const deg = parseInt(this.value, 10);
      const rad = deg * Math.PI / 180;
      selectedEl.userData.rotZ = rad;

      const cam3D = document.querySelector('#cam').getObject3D('camera');
      const camPos = new THREE.Vector3();
      cam3D.getWorldPosition(camPos);
      selectedEl.object3D.lookAt(camPos);
      const r = selectedEl.object3D.rotation;
      selectedEl.object3D.rotation.set(r.x, r.y, r.z + rad);

      document.getElementById('rotation-val').textContent = deg + '°';
    });

    document.getElementById('rotation-slider').addEventListener('change', () => saveObjects());

    // ── Remover objeto ─────────────────────────────────────────────────────────
    document.getElementById('remove-btn').addEventListener('click', () => {
      if (!selectedEl) return;
      selectedEl.parentNode.removeChild(selectedEl);
      selectedEl = null;
      document.getElementById('controls').style.display = 'none';
      saveObjects();
    });

    // ── Listeners do painel de botão ──────────────────────────────────────────
    document.getElementById('add-nav-btn').addEventListener('click', () => {
      const el = createButtonEl(
        crypto.randomUUID(), '→ Destino', '',
        { x: 0, y: 1.6, z: -4 }, 1, 0
      );
      document.querySelector('a-scene').appendChild(el);
      selectButton(el);
      saveButtons();
    });

    document.getElementById('btn-label-input').addEventListener('input', function () {
      if (!selectedBtnEl) return;
      selectedBtnEl.dataset.btnLabel = this.value;
      selectedBtnEl.querySelector('[troika-text]').setAttribute('troika-text', 'value', this.value);
    });

    document.getElementById('btn-label-input').addEventListener('blur',
      () => { if (selectedBtnEl) saveButtons(); });

    document.getElementById('btn-target-select').addEventListener('change', function () {
      if (!selectedBtnEl) return;
      selectedBtnEl.dataset.btnTargetSceneId = this.value;
      saveButtons();
    });

    document.getElementById('btn-scale-slider').addEventListener('input', function () {
      if (!selectedBtnEl) return;
      const s = parseFloat(this.value);
      selectedBtnEl.object3D.scale.set(s, s, s);
      document.getElementById('btn-scale-val').textContent = s.toFixed(1) + '×';
    });

    document.getElementById('btn-scale-slider').addEventListener('change', () => saveButtons());

    document.getElementById('btn-remove-btn').addEventListener('click', () => {
      if (!selectedBtnEl) return;
      selectedBtnEl.parentNode.removeChild(selectedBtnEl);
      selectedBtnEl = null;
      document.getElementById('button-controls').style.display = 'none';
      saveButtons();
    });

    // ── Listeners do painel de texto ──────────────────────────────────────────
    document.getElementById('add-text-panel-btn').addEventListener('click', () => {
      const el = createTextPanelEl(
        crypto.randomUUID(), '', { x: 0, y: 1.6, z: -4 }, 1, 0
      );
      document.querySelector('a-scene').appendChild(el);
      selectTextPanel(el);
      saveTextPanels();
    });

    document.getElementById('panel-content-input').addEventListener('input', function () {
      if (!selectedPanelEl) return;
      selectedPanelEl.dataset.panelContent = this.value;
      selectedPanelEl.querySelector('[troika-text]')
        .setAttribute('troika-text', 'value', this.value);
    });

    document.getElementById('panel-content-input').addEventListener('blur',

    document.getElementById('panel-scale-slider').addEventListener('input', function () {
      if (!selectedPanelEl) return;
      const s = parseFloat(this.value);
      selectedPanelEl.object3D.scale.set(s, s, s);
      document.getElementById('panel-scale-val').textContent = s.toFixed(1) + '×';
    });

    document.getElementById('panel-scale-slider').addEventListener('change',
      () => saveTextPanels());

    document.getElementById('panel-remove-btn').addEventListener('click', () => {
      if (!selectedPanelEl) return;
      selectedPanelEl.parentNode.removeChild(selectedPanelEl);
      selectedPanelEl = null;
      document.getElementById('text-panel-controls').style.display = 'none';
      saveTextPanels();
    });

    // ── Listeners do painel de legenda ────────────────────────────────────────
    document.getElementById('add-label-btn').addEventListener('click', () => {
      const el = createLabelEl(
        crypto.randomUUID(), 'Legenda', { x: 0, y: 1.6, z: -4 }, 1, 0
      );
      document.querySelector('a-scene').appendChild(el);
      selectLabel(el);
      saveLabels();
    });

    document.getElementById('label-text-input').addEventListener('input', function () {
      if (!selectedLabelEl) return;
      selectedLabelEl.dataset.labelText = this.value;
      selectedLabelEl.querySelector('[troika-text]')
        .setAttribute('troika-text', 'value', this.value);
    });

    document.getElementById('label-text-input').addEventListener('blur',

    document.getElementById('label-scale-slider').addEventListener('input', function () {
      if (!selectedLabelEl) return;
      const s = parseFloat(this.value);
      selectedLabelEl.object3D.scale.set(s, s, s);
      document.getElementById('label-scale-val').textContent = s.toFixed(1) + '×';
    });

    document.getElementById('label-scale-slider').addEventListener('change',
      () => saveLabels());

    document.getElementById('label-remove-btn').addEventListener('click', () => {
      if (!selectedLabelEl) return;
      selectedLabelEl.parentNode.removeChild(selectedLabelEl);
      selectedLabelEl = null;
      document.getElementById('label-controls').style.display = 'none';
      saveLabels();
    });

    // ── Música de fundo ────────────────────────────────────────────────────────
    document.getElementById('music-btn').onclick = () =>
      document.getElementById('music-input').click();

    document.getElementById('music-input').addEventListener('change', async function (e) {
      const file = e.target.files[0];
      if (!file) return;

      const form = new FormData();
      form.append('file', file);
      const { path: musicPath } = await fetch('/api/upload/music', {
        method: 'POST', body: form
      }).then(r => r.json());

      await fetch(`/api/scenes/${sceneId}`, {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ music: musicPath })
      });

      updateMusicUI(musicPath);
      this.value = '';
    });

    document.getElementById('music-remove-btn').addEventListener('click', async () => {
      await fetch(`/api/scenes/${sceneId}`, {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ music: null })
      });
      updateMusicUI(null);
    });

    // ── Som de clique ──────────────────────────────────────────────────────────
    document.getElementById('clicksound-btn').onclick = () =>
      document.getElementById('clicksound-input').click();

    document.getElementById('clicksound-input').addEventListener('change', async function (e) {
      const file = e.target.files[0];
      if (!file) return;

      const form = new FormData();
      form.append('file', file);
      const { path: soundPath } = await fetch('/api/upload/clicksound', {
        method: 'POST', body: form
      }).then(r => r.json());

      await fetch(`/api/scenes/${sceneId}`, {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ clickSound: soundPath })
      });

      updateClickSoundUI(soundPath);
      this.value = '';
    });

    document.getElementById('clicksound-remove-btn').addEventListener('click', async () => {
      await fetch(`/api/scenes/${sceneId}`, {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ clickSound: null })
      });
      updateClickSoundUI(null);
    });

    // ── Upload de imagem na cena ───────────────────────────────────────────────
    document.getElementById('upload-btn').onclick = () =>
      document.getElementById('file-input').click();

    document.getElementById('file-input').addEventListener('change', async function (e) {
      const file = e.target.files[0];
      if (!file) return;

      const form = new FormData();
      form.append('file', file);
      const { path: objPath } = await fetch('/api/upload/object', {
        method: 'POST', body: form
      }).then(r => r.json());

      const num = ++imageCount;
      const id  = 'img-' + num;

      const asset = document.createElement('img');
      asset.id = id;
      asset.src = objPath;
      document.getElementById('assets').appendChild(asset);

      asset.onload = () => {
        const aspect = asset.naturalWidth / asset.naturalHeight;
        const h = 2, w = h * aspect;

        const el = document.createElement('a-image');
        el.setAttribute('src',      '#' + id);
        el.setAttribute('width',    w);
        el.setAttribute('height',   h);
        el.setAttribute('position', '0 1.6 -4');
        el.setAttribute('material', 'transparent: true; alphaTest: 0.05');
        el.setAttribute('drag-move', '');
        el.dataset.objId          = crypto.randomUUID();
        el.dataset.objSrc         = objPath;
        el.dataset.objDescription = '';
        el.dataset.objDisappear   = 'false';
        el.dataset.objRequired    = 'false';
        el.userData = { imgNum: num, rotZ: 0 };
        document.querySelector('a-scene').appendChild(el);
        selectImage(el);
        saveObjects();
      };

      this.value = '';
    });

    // ── Seletor de fundos ──────────────────────────────────────────────────────
    async function openBgPicker() {
      const overlay = document.getElementById('bg-picker-overlay');
      const grid    = document.getElementById('bg-picker-grid');
      grid.innerHTML = '<span style="color:rgba(255,255,255,0.4);font-size:12px;padding:8px">Carregando...</span>';
      overlay.classList.add('open');

      const backgrounds = await fetch('/api/backgrounds').then(r => r.json());
      grid.innerHTML = '';
      backgrounds.forEach(bg => addBgItem(grid, bg));
    }

    function addBgItem(grid, bg) {
      const item = document.createElement('div');
      item.className = 'bg-item';

      const img = document.createElement('img');
      img.className = 'bg-thumb';
      img.src = bg.path;
      if (bg.path === currentBgPath) img.classList.add('active');
      img.addEventListener('click', () => selectBackground(bg.path));

      const nameEl = document.createElement('input');
      nameEl.type = 'text';
      nameEl.className = 'bg-item-name';
      nameEl.value = bg.name;
      nameEl.addEventListener('click', e => e.stopPropagation());
      nameEl.addEventListener('keydown', e => { if (e.key === 'Enter') nameEl.blur(); });
      nameEl.addEventListener('blur', async () => {
        const newName = nameEl.value.trim();
        if (!newName || newName === bg.name) return;
        await fetch(`/api/backgrounds/${bg.filename}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: newName })
        });
        bg.name = newName;
      });

      const delBtn = document.createElement('button');
      delBtn.className = 'bg-delete-btn';
      delBtn.textContent = '✕';
      delBtn.title = 'Deletar fundo';
      delBtn.addEventListener('click', async e => {
        e.stopPropagation();
        if (!confirm(`Deletar "${bg.name}"?`)) return;
        await fetch(`/api/backgrounds/${bg.filename}`, { method: 'DELETE' });
        item.remove();
      });

      item.appendChild(img);
      item.appendChild(nameEl);
      item.appendChild(delBtn);
      grid.appendChild(item);
    }

    async function selectBackground(bgPath) {
      document.getElementById('bg-picker-overlay').classList.remove('open');
      applyBackground(bgPath);
      currentBgPath = bgPath;
      await fetch(`/api/scenes/${sceneId}`, {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ background: bgPath })
      });
    }

    document.getElementById('bg-btn').onclick = openBgPicker;

    document.getElementById('bg-picker-cancel').addEventListener('click', () =>
      document.getElementById('bg-picker-overlay').classList.remove('open')
    );

    document.getElementById('bg-picker-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('bg-picker-overlay'))
        document.getElementById('bg-picker-overlay').classList.remove('open');
    });

    document.getElementById('bg-picker-upload').addEventListener('click', () =>
      document.getElementById('bg-input').click()
    );

    // ── Upload de fundo ────────────────────────────────────────────────────────

    document.getElementById('bg-input').addEventListener('change', async function (e) {
      const file = e.target.files[0];
      if (!file) return;

      // Fecha o picker durante o upload
      document.getElementById('bg-picker-overlay').classList.remove('open');

      const localUrl = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        const tex = new THREE.Texture(img);
        tex.needsUpdate = true;
        const mesh = document.querySelector('#sky').getObject3D('mesh');
        if (!mesh) return;
        if (mesh.material.map) mesh.material.map.dispose();
        mesh.material.map = tex;
        mesh.material.needsUpdate = true;
      };
      img.src = localUrl;

      const form = new FormData();
      form.append('file', file);
      const { path: bgPath, name: bgName } = await fetch('/api/upload/background', {
        method: 'POST', body: form
      }).then(r => r.json());

      await fetch(`/api/scenes/${sceneId}`, {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ background: bgPath })
      });

      currentBgPath = bgPath;
      // Adiciona novo thumbnail ao grid se o picker for reaberto
      const grid = document.getElementById('bg-picker-grid');
      if (grid) {
        const filename = bgPath.replace('fundos/', '');
        addBgItem(grid, { filename, name: bgName || filename, path: bgPath });
      }
      this.value = '';
    });
  </script>
